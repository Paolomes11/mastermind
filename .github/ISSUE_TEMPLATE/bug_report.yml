name: Bug Report
description: Something is not working as expected
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: "The solver outputs wrong feedback when..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands or steps that trigger the bug.
      placeholder: |
        1. Run `./mastermind -c 6 -p 4 -i`
        2. Enter guess feedback `2 1`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error output or crash messages.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler and version
      placeholder: "e.g. GCC 13.2, Clang 17, Apple Clang 15"
    validations:
      required: true

  - type: input
    id: cmake
    attributes:
      label: CMake version
      placeholder: "e.g. 3.28"
